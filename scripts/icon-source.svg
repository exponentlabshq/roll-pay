<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Roll">
  <!-- Ink background, full bleed -->
  <rect width="512" height="512" fill="#0B0E0C"/>
  <!-- Lime-deep edge (slightly larger circle behind the lime face) -->
  <circle cx="256" cy="256" r="204" fill="#A6E000"/>
  <!-- Lime coin face -->
  <circle cx="256" cy="256" r="200" fill="#C8FF3D"/>
  <!-- Soft upper-left highlight on the coin -->
  <ellipse cx="200" cy="200" rx="70" ry="48" fill="#E2FF8A" opacity="0.55"/>
</svg>
